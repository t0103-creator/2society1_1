<!doctype html>
<html lang="ko">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아시아 국가별 수도와 문화 - 수행평가지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      overflow-y: auto;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .region-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      pointer-events: auto;
    }

    .region-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .region-label {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .country-name {
      font-size: 1.8em;
      font-weight: 700;
      color: #333;
      margin-bottom: 20px;
      word-break: keep-all;
    }

    .info-section {
      margin-bottom: 25px;
    }

    .info-label {
      font-size: 0.9em;
      font-weight: 600;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: block;
    }

    .info-content {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8f9ff;
      padding: 12px 15px;
      border-radius: 10px;
      min-height: 50px;
      border: 2px dashed #e0e0e0;
    }

    .info-text {
      flex: 1;
      color: #555;
      font-size: 1em;
      line-height: 1.5;
    }

    .info-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1em;
      color: #333;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 0;
      outline: none;
    }

    .info-input::placeholder {
      color: #ccc;
    }

    .image-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.2s ease, opacity 0.2s ease;
      flex-shrink: 0;
    }

    .image-button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .image-button:active {
      transform: scale(0.95);
    }

    .image-preview-container {
      width: 100%;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .image-preview {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }

    .hidden-input {
      display: none;
    }

    .info-empty {
      color: #999;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .region-card {
        padding: 20px;
      }

      .country-name {
        font-size: 1.5em;
      }

      .regions-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 복사 방지 설정 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      user-select: none;
    }

    ::selection {
      background: transparent;
    }

    ::-moz-selection {
      background: transparent;
    }

    .activity-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-button {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tab-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    .tab-button.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }

    .activity-content {
      display: none;
    }

    .activity-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .activity2-card {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .activity-title {
      font-size: 1.8em;
      font-weight: 700;
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .activity2-section {
      margin-bottom: 35px;
      padding-bottom: 35px;
      border-bottom: 2px solid #f0f0f0;
    }

    .activity2-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .full-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: border-color 0.3s ease;
    }

    .full-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .tourism-content {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .tourism-textarea {
      width: 100%;
      min-height: 150px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    .tourism-textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .tourism-button-area {
      display: flex;
      gap: 10px;
    }

    .tourism-image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
      min-height: 20px;
    }

    .tourism-image-item {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .tourism-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>

 </head>

   <script>
    // 복사 방지
    document.addEventListener('copy', function(e) {
      e.preventDefault();
      return false;
    });

    document.addEventListener('cut', function(e) {
      e.preventDefault();
      return false;
    });

    // 우클릭 컨텍스트 메뉴 제한
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });

    // 개발자 도구 단축키 방지
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && e.key === 'I') ||
          (e.ctrlKey && e.shiftKey && e.key === 'J') ||
          (e.ctrlKey && e.shiftKey && e.key === 'C')) {
        e.preventDefault();
        return false;
      }
    });

    function triggerImageUpload(button, inputId) {
      document.getElementById(inputId).click();
    }

    function handleImageUpload(input, previewId) {
      const file = input.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert('파일 크기가 너무 큽니다. 5MB 이하의 파일을 선택해주세요.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const previewContainer = document.getElementById(previewId);
        previewContainer.innerHTML = '';
        
        const container = document.createElement('div');
        container.className = 'image-preview-container';
        
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'image-preview';
        
        container.appendChild(img);
        previewContainer.appendChild(container);
      };
      reader.readAsDataURL(file);
    }

    function switchActivity(activityId) {
      document.querySelectorAll('.activity-content').forEach(el => {
        el.classList.remove('active');
      });

      document.querySelectorAll('.tab-button').forEach(el => {
        el.classList.remove('active');
      });

      document.getElementById(activityId).classList.add('active');
      event.target.classList.add('active');
    }

    function handleTourismImage(input) {
      const file = input.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert('파일 크기가 너무 큽니다. 5MB 이하의 파일을 선택해주세요.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const previewContainer = document.getElementById('tourism-image-preview');
        
        const itemContainer = document.createElement('div');
        itemContainer.className = 'tourism-image-item';
        
        const img = document.createElement('img');
        img.src = e.target.result;
        
        itemContainer.appendChild(img);
        previewContainer.appendChild(itemContainer);
      };
      reader.readAsDataURL(file);
    }

    function downloadPDF() {
      const element = document.querySelector('.activity2-card');
      const opt = {
        margin: 10,
        filename: '아시아국가여행계획.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };

      html2pdf().set(opt).from(element).save();
    }

    function downloadActivity1PDF() {
      const element = document.querySelector('#activity1');
      const opt = {
        margin: 10,
        filename: '아시아국가소개.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 3, useCORS: true, logging: false },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };

      html2pdf().set(opt).from(element).save();
    }

    async function downloadActivity1Image() {
      try {
        const activity1Element = document.querySelector('#activity1');
        const canvas1 = await html2canvas(activity1Element, {
          scale: 3,
          useCORS: true,
          logging: false,
          allowTaint: true,
          backgroundColor: '#ffffff',
          width: activity1Element.offsetWidth,
          height: activity1Element.offsetHeight
        });
        
        const link1 = document.createElement('a');
        link1.href = canvas1.toDataURL('image/png');
        link1.download = '활동1_국가소개.png';
        document.body.appendChild(link1);
        link1.click();
        document.body.removeChild(link1);
      } catch (error) {
        console.error('이미지 저장 중 오류가 발생했습니다:', error);
      }
    }

    async function downloadActivity2Image() {
      try {
        const activity2Cards = document.querySelectorAll('.activity2-card');
